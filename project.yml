name: CardScanapotamus
options:
  bundleIdPrefix: com.stevebliss
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  CardScanapotamus:
    type: application
    platform: iOS
    sources:
      - CardScanapotamus
    settings:
      base:
        INFOPLIST_FILE: CardScanapotamus/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.stevebliss.CardScanapotamus
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: NP58A25HR5
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Development"
